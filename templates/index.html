<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Data Intelligence Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #F9FAFB;
            --text-color: #111827;
            --border-color: #E5E7EB;
            --card-bg: #FFFFFF;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            background-color: var(--card-bg);
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            padding: 1.5rem 0;
            text-align: center;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        main {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            flex-grow: 1;
        }

        .upload-card {
            background-color: var(--card-bg);
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            text-align: center;
            border: 2px dashed var(--border-color);
            transition: border-color 0.3s ease;
        }

        .upload-card:hover {
            border-color: var(--primary-color);
        }

        .file-input-wrapper {
            position: relative;
            margin-bottom: 1rem;
        }

        input[type="file"] {
            display: none;
        }

        .file-label {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border-radius: 0.375rem;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        .file-label:hover {
            background-color: var(--primary-hover);
        }

        .file-name {
            margin-top: 1rem;
            font-size: 0.875rem;
            color: #6B7280;
        }

        button {
            padding: 0.75rem 1.5rem;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 0.375rem;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:disabled {
            background-color: #9CA3AF;
            cursor: not-allowed;
        }

        .results-section {
            margin-top: 2rem;
            display: none;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .results-header h2 {
            font-size: 1.25rem;
            margin: 0;
        }

        pre {
            background-color: #1F2937;
            color: #F9FAFB;
            padding: 1.5rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            font-size: 0.875rem;
            max-height: 500px;
            overflow-y: auto;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
        }

        .loader {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid var(--primary-color);
            width: 24px;
            height: 24px;
            -webkit-animation: spin 1s linear infinite;
            animation: spin 1s linear infinite;
            display: none;
            margin: 1rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            color: #DC2626;
            margin-top: 1rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <header>
        <h1>Universal Data Intelligence Platform</h1>
    </header>

    <main>
        <div class="upload-card">
            <h2 style="margin-top: 0; margin-bottom: 1.5rem; font-size: 1.25rem;">Upload Excel Files (Min 3)</h2>
            <div id="fileListContainer" style="text-align: left; margin-bottom: 1rem;"></div>
            <form id="uploadForm">
                <div class="file-input-wrapper">
                    <input type="file" id="fileInput" accept=".xlsx, .xls">
                    <button type="button" id="addFileBtn" class="file-label" style="display:inline-flex; align-items:center; gap:0.5rem; border:none;">
                        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        Add File
                    </button>
                </div>
                <div class="file-name" id="statusText" style="margin-bottom: 1rem;">Please add at least 3 files.</div>
                <button type="submit" id="submitBtn" disabled>Upload & Process</button>
            </form>
            <div class="loader" id="loader"></div>
            <div class="error-message" id="errorMessage"></div>
        </div>

        <div class="results-section" id="resultsSection">
            <div class="results-header">
                <h2>Schema Discovery & Normalization Results</h2>
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <span id="processingTimeDisplay" style="font-size: 0.875rem; color: #6B7280; font-weight: 500;"></span>
                    <button id="downloadBtn" style="margin-top: 0;">Download Full JSON</button>
                </div>
            </div>
            
            <h3 style="margin-top: 1.5rem; font-size: 1rem;">Original Columns Detected</h3>
            <pre id="originalColumnsOutput"></pre>
            
            <h3 style="margin-top: 1.5rem; font-size: 1rem;">Mappings Applied</h3>
            <pre id="mappingsOutput"></pre>
            
            <h3 style="margin-top: 1.5rem; font-size: 1rem;">Summary Report (First 10 Records)</h3>
            <pre id="jsonOutput"></pre>
        </div>
    </main>

    <script>
        const fileInput = document.getElementById('fileInput');
        const addFileBtn = document.getElementById('addFileBtn');
        const fileListContainer = document.getElementById('fileListContainer');
        const statusText = document.getElementById('statusText');
        const submitBtn = document.getElementById('submitBtn');
        const uploadForm = document.getElementById('uploadForm');
        const loader = document.getElementById('loader');
        const resultsSection = document.getElementById('resultsSection');
        const jsonOutput = document.getElementById('jsonOutput');
        const errorMessage = document.getElementById('errorMessage');
        const downloadBtn = document.getElementById('downloadBtn');
        const processingTimeDisplay = document.getElementById('processingTimeDisplay');

        let currentDownloadId = null;
        let currentFilename = 'data.json';
        let selectedFiles = [];

        addFileBtn.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                selectedFiles.push(file);
                updateUI();
                fileInput.value = '';
            }
        });

        function updateUI() {
            fileListContainer.innerHTML = '';
            selectedFiles.forEach((f, index) => {
                const item = document.createElement('div');
                item.style.padding = '0.5rem';
                item.style.backgroundColor = '#F3F4F6';
                item.style.marginBottom = '0.5rem';
                item.style.borderRadius = '0.25rem';
                item.style.fontSize = '0.875rem';
                item.style.display = 'flex';
                item.style.justifyContent = 'space-between';
                item.innerHTML = `<span>File ${index + 1}: ${f.name}</span> <span style="color:#10B981; font-weight:bold;">&#10003; Added</span>`;
                fileListContainer.appendChild(item);
            });

            if (selectedFiles.length >= 3) {
                statusText.textContent = `${selectedFiles.length} files ready to process.`;
                statusText.style.color = '#10B981';
                submitBtn.disabled = false;
                errorMessage.textContent = '';
            } else {
                statusText.textContent = `Please add ${3 - selectedFiles.length} more file(s).`;
                statusText.style.color = '#6B7280';
                submitBtn.disabled = true;
            }
        }

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (selectedFiles.length < 3) {
                errorMessage.textContent = 'Please select at least 3 files.';
                return;
            }

            const formData = new FormData();
            selectedFiles.forEach(f => formData.append('files', f));

            // UI Feedback
            submitBtn.disabled = true;
            loader.style.display = 'block';
            resultsSection.style.display = 'none';
            errorMessage.textContent = '';
            
            const startTime = performance.now();

            try {
                const response = await fetch('/api/convert', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || errorData.detail || 'Error converting file');
                }

                const result = await response.json();
                
                const endTime = performance.now();
                const timeTakenMs = (endTime - startTime).toFixed(0);
                
                // Store download id for the download button
                currentDownloadId = result.download_id;
                currentFilename = "normalized_data.json";

                const filesProcessed = Object.keys(result.original_columns || {}).length;
                const recordsProcessed = result.records_processed || 0;
                const summaryReport = {
                    files_processed: filesProcessed,
                    entity_resolution: result.entity_resolution_report,
                    sample_records: result.sample_records || []
                };

                // Display result
                processingTimeDisplay.textContent = `Processing Time: ${timeTakenMs} ms`;
                document.getElementById('originalColumnsOutput').textContent = JSON.stringify(result.original_columns, null, 2);
                document.getElementById('mappingsOutput').textContent = JSON.stringify(result.mappings_applied, null, 2);
                jsonOutput.textContent = JSON.stringify(summaryReport, null, 2);
                resultsSection.style.display = 'block';
                
            } catch (error) {
                errorMessage.textContent = error.message;
            } finally {
                submitBtn.disabled = false;
                loader.style.display = 'none';
            }
        });

        downloadBtn.addEventListener('click', () => {
            if (!currentDownloadId) return;

            // Stream the file directly from the endpoint, avoiding browser memory overload
            window.location.href = `/api/download/${currentDownloadId}`;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Universal Data Intelligence Platform{% endblock %}</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #4F46E5;      /* Indigo 600 */
            --primary-hover: #4338CA;      /* Indigo 700 */
            --primary-light: #EEF2FF;      /* Indigo 50 */
            --secondary-color: #10B981;    /* Emerald 500 */
            --danger-color: #EF4444;       /* Red 500 */
            --danger-hover: #DC2626;
            --bg-color: #F3F4F6;           /* Gray 100 */
            --surface-color: #FFFFFF;
            --sidebar-bg: #111827;         /* Gray 900 */
            --sidebar-text: #9CA3AF;       /* Gray 400 */
            --sidebar-hover: #1F2937;      /* Gray 800 */
            --sidebar-active: #374151;     /* Gray 700 */
            --text-main: #111827;          /* Gray 900 */
            --text-muted: #6B7280;         /* Gray 500 */
            --border-color: #E5E7EB;       /* Gray 200 */
            
            --sidebar-width: 260px;
            --topbar-height: 64px;
            --border-radius-md: 0.5rem;
            --border-radius-lg: 0.75rem;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Layout */
        .app-container {
            display: flex;
            width: 100%;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 20;
            transition: all 0.3s ease;
        }

        .sidebar-brand {
            height: var(--topbar-height);
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            font-size: 1.25rem;
            font-weight: 700;
            color: white;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-brand i {
            color: var(--primary-color);
            margin-right: 0.75rem;
        }

        .sidebar-nav {
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-grow: 1;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 0.75rem 1rem;
            color: var(--sidebar-text);
            text-decoration: none;
            border-radius: var(--border-radius-md);
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .nav-item i {
            width: 20px;
            margin-right: 0.75rem;
            font-size: 1.1rem;
        }

        .nav-item:hover {
            background-color: var(--sidebar-hover);
            color: white;
        }

        .nav-item.active {
            background-color: var(--primary-color);
            color: white;
        }
        
        .sidebar-footer {
            padding: 1.5rem 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Main Content Area */
        .main-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-width: 0; /* Important for flex child truncation */
        }

        /* Topbar */
        .topbar {
            height: var(--topbar-height);
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            z-index: 10;
        }

        .topbar-search {
            position: relative;
            width: 300px;
        }

        .topbar-search i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .topbar-search input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            border: 1px solid var(--border-color);
            border-radius: 9999px;
            background-color: var(--bg-color);
            font-family: inherit;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .topbar-search input:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: white;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .action-icon {
            color: var(--text-muted);
            font-size: 1.25rem;
            cursor: pointer;
            transition: color 0.2s;
            position: relative;
        }
        
        .action-icon:hover {
            color: var(--text-main);
        }
        
        .notification-dot {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 8px;
            height: 8px;
            background-color: var(--danger-color);
            border-radius: 50%;
            border: 2px solid white;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            transition: background-color 0.2s;
        }
        
        .user-profile:hover {
            background-color: var(--bg-color);
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary-color), #818cf8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.875rem;
        }

        .user-name {
            font-weight: 500;
            font-size: 0.875rem;
        }

        /* Content Area */
        .content-area {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        /* Shared Components */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.625rem 1.25rem;
            border-radius: var(--border-radius-md);
            font-weight: 500;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            border: 1px solid transparent;
        }
        
        .btn i {
            margin-right: 0.5rem;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }
        
        .btn-secondary {
            background-color: white;
            color: var(--text-main);
            border-color: var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        .btn-secondary:hover {
            background-color: var(--bg-color);
        }
        
        .btn-danger {
            background-color: white;
            color: var(--danger-color);
            border-color: var(--danger-color);
        }
        
        .btn-danger:hover {
            background-color: var(--danger-color);
            color: white;
        }

        .saas-card {
            background-color: var(--surface-color);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        /* SaaS Table */
        .table-container {
            background-color: var(--surface-color);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .saas-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .saas-table th {
            background-color: #F9FAFB;
            padding: 1rem 1.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .saas-table td {
            padding: 1rem 1.5rem;
            font-size: 0.875rem;
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }
        
        .saas-table tbody tr {
            transition: background-color 0.15s;
        }

        .saas-table tbody tr:hover {
            background-color: #F9FAFB;
        }
        
        .saas-table tbody tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.125rem 0.625rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge-success { background-color: #D1FAE5; color: #065F46; }
        .badge-warning { background-color: #FEF3C7; color: #92400E; }
        .badge-danger { background-color: #FEE2E2; color: #991B1B; }
        .badge-info { background-color: #DBEAFE; color: #1E40AF; }
        .badge-primary { background-color: var(--primary-light); color: var(--primary-hover); }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            text-align: center;
        }

        .empty-state-icon {
            width: 64px;
            height: 64px;
            background-color: var(--primary-light);
            color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .empty-state h3 {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--text-muted);
            font-size: 0.875rem;
            max-width: 400px;
            margin-bottom: 1.5rem;
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-layer-group"></i> UDIP
            </div>
            <nav class="sidebar-nav">
                <!-- Using JS to highlight active nav link -->
                <a href="/dashboard" class="nav-link nav-item" data-path="/dashboard"><i class="fas fa-chart-pie"></i> Dashboard</a>
                <a href="/" class="nav-link nav-item" data-path="/"><i class="fas fa-cloud-upload-alt"></i> Upload</a>
                <a href="/history" class="nav-link nav-item" data-path="/history"><i class="fas fa-history"></i> History</a>
                <a href="/templates" class="nav-link nav-item" data-path="/templates"><i class="fas fa-file-code"></i> Templates</a>
                <a href="/developer" class="nav-link nav-item" data-path="/developer"><i class="fas fa-terminal"></i> API</a>
            </nav>
            <div class="sidebar-footer">
                <a href="/logout" class="nav-item" style="color: var(--danger-color);"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </aside>

        <!-- Main Wrapper -->
        <div class="main-wrapper">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-search">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search projects or templates...">
                </div>
                <div class="topbar-actions">
                    <div class="action-icon">
                        <i class="fas fa-bell"></i>
                        <div class="notification-dot"></div>
                    </div>
                    <div class="user-profile">
                        <div class="avatar">{{ user.name[0] if user else 'U' }}</div>
                        <span class="user-name">{{ user.name if user else 'User' }}</span>
                    </div>
                </div>
            </header>

            <!-- Content Area -->
            <main class="content-area">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script>
        // Highlight active sidebar link
        document.addEventListener('DOMContentLoaded', () => {
            const currentPath = window.location.pathname;
            document.querySelectorAll('.nav-link').forEach(link => {
                if(link.getAttribute('data-path') === currentPath) {
                    link.classList.add('active');
                }
            });
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
